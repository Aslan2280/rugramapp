<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RuGram - Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f7fb;
            --bg-secondary: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #6c6f78;
            --accent: #429ef3;
            --accent-dark: #2b7bc9;
            --border: #e1e4e8;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border: #2a2a3e;
            --glass-bg: rgba(30, 30, 50, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        [data-theme="personal"] {
            --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-secondary: rgba(255, 255, 255, 0.95);
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --accent: #ed64a6;
            --accent-dark: #d53f8c;
            --border: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        body[data-theme="personal"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: var(--shadow);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--accent);
            color: white;
        }

        .btn:hover {
            background: var(--accent-dark);
            transform: scale(0.98);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            font-size: 16px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(66, 158, 243, 0.1);
        }

        .theme-switch {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-btn.light { background: #f5f7fb; border: 1px solid #ddd; }
        .theme-btn.dark { background: #1a1a2e; border: 1px solid #333; }
        .theme-btn.personal { background: linear-gradient(135deg, #667eea, #764ba2); }

        .theme-btn.active {
            transform: scale(1.1);
            box-shadow: 0 0 0 2px var(--accent);
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            transition: background 0.1s;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .chat-item:hover {
            background: var(--border);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            margin-right: 14px;
            flex-shrink: 0;
            color: white;
        }

        .message {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.out {
            background: var(--accent);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.in {
            background: var(--bg-secondary);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow);
        }

        .message-media {
            max-width: 200px;
            border-radius: 12px;
            margin-top: 6px;
            cursor: pointer;
        }

        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: var(--shadow);
            z-index: 100;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }

        @media (max-width: 768px) {
            .message { max-width: 85%; }
            .fab { bottom: 70px; right: 16px; width: 50px; height: 50px; }
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
        }
    </style>
</head>

    <script>

        // Шифрование
        const encoder = new TextEncoder()
        const decoder = new TextDecoder()
        
        async function getEncryptionKey() {
            let key = localStorage.getItem('encryption_key')
            if (!key) {
                const newKey = await crypto.subtle.generateKey(
                    { name: 'AES-GCM', length: 256 },
                    true,
                    ['encrypt', 'decrypt']
                )
                const exported = await crypto.subtle.exportKey('jwk', newKey)
                localStorage.setItem('encryption_key', JSON.stringify(exported))
                key = exported
            } else {
                key = JSON.parse(key)
            }
            return await crypto.subtle.importKey('jwk', key, { name: 'AES-GCM' }, true, ['encrypt', 'decrypt'])
        }
        
        async function encryptText(text) {
            try {
                const key = await getEncryptionKey()
                const iv = crypto.getRandomValues(new Uint8Array(12))
                const encoded = encoder.encode(text)
                const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoded)
                const combined = new Uint8Array(iv.length + encrypted.byteLength)
                combined.set(iv)
                combined.set(new Uint8Array(encrypted), iv.length)
                return btoa(String.fromCharCode(...combined))
            } catch { return text }
        }
        
        async function decryptText(encryptedBase64) {
            try {
                const key = await getEncryptionKey()
                const combined = Uint8Array.from(atob(encryptedBase64), c => c.charCodeAt(0))
                const iv = combined.slice(0, 12)
                const encrypted = combined.slice(12)
                const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, encrypted)
                return decoder.decode(decrypted)
            } catch { return encryptedBase64 }
        }
        
        async function loadSupabase() {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script')
                script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js'
                script.onload = () => {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
                    resolve()
                }
                script.onerror = () => reject(new Error('Ошибка загрузки Supabase'))
                document.head.appendChild(script)
            })
        }
        
        async function getCurrentUser() {
            if (!supabase) return null
            try {
                const { data: { user } } = await supabase.auth.getUser()
                return user
            } catch { return null }
        }
        
        async function getProfile(userId) {
            if (!supabase) return null
            try {
                const { data } = await supabase.from('profiles').select('*').eq('id', userId).single()
                return data
            } catch { return null }
        }
        
        async function getUserChats() {
            if (!supabase) return []
            const user = await getCurrentUser()
            if (!user) return []
            try {
                const { data } = await supabase
                    .from('chat_members')
                    .select('chat_id, role, chat:chats(*)')
                    .eq('user_id', user.id)
                if (!data) return []
                
                const chats = []
                for (const member of data) {
                    if (!member.chat) continue
                    const chat = member.chat
                    let chatName = chat.name
                    if (chat.chat_type === 'private') {
                        const { data: other } = await supabase
                            .from('chat_members')
                            .select('user_id')
                            .eq('chat_id', chat.id)
                            .neq('user_id', user.id)
                            .single()
                        if (other) {
                            const profile = await getProfile(other.user_id)
                            chatName = profile?.username || 'Пользователь'
                        }
                    }
                    chats.push({ ...chat, name: chatName || 'Чат', role: member.role })
                }
                return chats
            } catch { return [] }
        }
        
        async function getMessages(chatId) {
            if (!supabase) return []
            try {
                const { data } = await supabase
                    .from('messages')
                    .select('*, sender:sender_id(id, username)')
                    .eq('chat_id', chatId)
                    .eq('is_deleted', false)
                    .order('created_at', { ascending: true })
                    .limit(50)
                if (!data) return []
                for (const msg of data) {
                    if (msg.encrypted_content) {
                        msg.decrypted = await decryptText(msg.encrypted_content)
                    }
                }
                return data
            } catch { return [] }
        }
        
        async function sendMessage(chatId, text, file = null) {
            if (!supabase) return
            const user = await getCurrentUser()
            if (!user) return
            
            let mediaUrl = null, mediaType = null, fileName = null
            
            if (file) {
                try {
                    const ext = file.name.split('.').pop()
                    const path = `chat_${chatId}/${Date.now()}.${ext}`
                    await supabase.storage.from('rugram-media').upload(path, file)
                    const { data: { publicUrl } } = supabase.storage.from('rugram-media').getPublicUrl(path)
                    mediaUrl = publicUrl
                    mediaType = file.type.startsWith('image') ? 'image' : file.type.startsWith('video') ? 'video' : 'document'
                    fileName = file.name
                } catch {}
            }
            
            const encrypted = await encryptText(text)
            await supabase.from('messages').insert({
                chat_id: chatId,
                sender_id: user.id,
                encrypted_content: encrypted,
                media_url: mediaUrl,
                media_type: mediaType,
                file_name: fileName
            })
        }
        
        function subscribeToMessages(chatId, callback) {
            if (!supabase) return { unsubscribe: () => {} }
            return supabase
                .channel(`chat-${chatId}`)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `chat_id=eq.${chatId}`
                }, async (payload) => {
                    const msg = payload.new
                    if (msg.encrypted_content) {
                        msg.decrypted = await decryptText(msg.encrypted_content)
                    }
                    const { data: sender } = await supabase
                        .from('profiles')
                        .select('id, username')
                        .eq('id', msg.sender_id)
                        .single()
                    callback({ ...msg, sender })
                })
                .subscribe()
        }

                const { data } = await supabase.from('gifts').select('*').eq('is_active', true).order('price_stars')
                return data || []

        async function getStarBalance() {
            if (!supabase) return 0
            const user = await getCurrentUser()
            if (!user) return 0
            try {
                const { data } = await supabase.from('profiles').select('stars_balance').eq('id', user.id).single()
                return data?.stars_balance || 0
            } catch { return 0 }
        }
        
        async function getActiveStories() {
            if (!supabase) return []
            const user = await getCurrentUser()
            if (!user) return []
            try {
                const { data: chats } = await supabase.from('chat_members').select('chat_id').eq('user_id', user.id)
                if (!chats || chats.length === 0) return []
                const chatIds = chats.map(c => c.chat_id)
                const { data: members } = await supabase.from('chat_members').select('user_id').in('chat_id', chatIds).neq('user_id', user.id)
                const userIds = [...new Set(members.map(m => m.user_id))]
                if (userIds.length === 0) return []
                const { data } = await supabase.from('stories').select('*, user:user_id(id, username)').in('user_id', userIds).gt('expires_at', new Date().toISOString())
                return data || []
            } catch { return [] }
        }
        
        async function uploadStory(file) {
            if (!supabase) return
            const user = await getCurrentUser()
            if (!user) return
            try {
                const ext = file.name.split('.').pop()
                const path = `stories/${user.id}/${Date.now()}.${ext}`
                await supabase.storage.from('rugram-media').upload(path, file)
                const { data: { publicUrl } } = supabase.storage.from('rugram-media').getPublicUrl(path)
                const expiresAt = new Date()
                expiresAt.setHours(expiresAt.getHours() + 24)
                await supabase.from('stories').insert({
                    user_id: user.id,
                    media_url: publicUrl,
                    media_type: file.type.startsWith('image') ? 'image' : 'video',
                    expires_at: expiresAt.toISOString()
                })
            } catch {}
        }
        
        async function isAdmin() {
            if (!supabase) return false
            const user = await getCurrentUser()
            if (!user) return false
            try {
                const { data } = await supabase.from('profiles').select('is_admin').eq('id', user.id).single()
                return data?.is_admin || false
            } catch { return false }

        async function getAllUsers() {
            if (!supabase) return []

                const { data } = await supabase.from('profiles').select('id, email, username, stars_balance, is_admin').order('created_at')

        async function modifyStars(userId, amount) {
            if (!supabase) return
            try {
                const { data: profile } = await supabase.from('profiles').select('stars_balance').eq('id', userId).single()
                await supabase.from('profiles').update({ stars_balance: (profile?.stars_balance || 0) + amount }).eq('id', userId)
            } catch {}

        async function searchUsers(query) {
            if (!supabase) return []
            try {
                const { data } = await supabase.from('profiles').select('id, username').ilike('username', `%${query}%`).limit(20)
                return data || []
            } catch { return [] }
        }
        
        async function createPrivateChat(userId) {
            if (!supabase) return null
            const user = await getCurrentUser()
            if (!user) return null
            try {
                const { data: chat } = await supabase.from('chats').insert({ chat_type: 'private', created_by: user.id }).select().single()
                if (!chat) return null
                await supabase.from('chat_members').insert([
                    { chat_id: chat.id, user_id: user.id, role: 'member' },
                    { chat_id: chat.id, user_id: userId, role: 'member' }
                ])
                return chat
            } catch { return null }
        }
        
        async function createGroupChat(name, userIds, description = '') {
            if (!supabase) return null
            const user = await getCurrentUser()
            if (!user) return null
            try {
                const { data: chat } = await supabase.from('chats').insert({ chat_type: 'group', name, description, created_by: user.id }).select().single()
                if (!chat) return null
                const members = [{ chat_id: chat.id, user_id: user.id, role: 'creator' }]
                for (const uid of userIds) {
                    members.push({ chat_id: chat.id, user_id: uid, role: 'member' })
                }
                await supabase.from('chat_members').insert(members)
                return chat
            } catch { return null }
        }
        
        async function createChannelChat(name, description = '') {
            if (!supabase) return null
            const user = await getCurrentUser()
            if (!user) return null
            try {
                const { data: chat } = await supabase.from('chats').insert({ chat_type: 'channel', name, description, created_by: user.id }).select().single()
                if (!chat) return null
                await supabase.from('chat_members').insert([{ chat_id: chat.id, user_id: user.id, role: 'creator' }])
                return chat
            } catch { return null }
        }

        async function showRegister() {
            showPage(`
                <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
                    <div class="glass" style="max-width:400px; width:100%; padding:40px 32px; text-align:center;">
                        <div style="font-size:48px;">✨</div>
                        <div style="font-size:28px; font-weight:bold;">Регистрация</div>
                        <div style="color:var(--text-secondary); margin-bottom:32px;">Присоединяйся к RuGram</div>
                        <form id="registerForm">
                            <div style="margin-bottom:20px;"><input type="text" id="username" class="input" placeholder="Имя пользователя" required></div>
                            <div style="margin-bottom:20px;"><input type="email" id="email" class="input" placeholder="Email" required></div>
                            <div style="margin-bottom:20px;"><input type="password" id="password" class="input" placeholder="Пароль (мин. 6 символов)" required></div>
                            <div style="margin-bottom:20px;"><input type="password" id="confirm" class="input" placeholder="Подтвердите пароль" required></div>
                            <button type="submit" class="btn" style="width:100%;">Зарегистрироваться</button>
                            <div id="registerError" style="color:#e53e3e; margin-top:12px; display:none;"></div>
                        </form>
                        <div style="margin-top:20px;">Уже есть аккаунт? <a href="#" onclick="showLogin()" style="color:var(--accent);">Войти</a></div>
                    </div>
                </div>
                <div class="theme-switch">
                    <button class="theme-btn light" onclick="setTheme('light')">☀️</button>
                    <button class="theme-btn dark" onclick="setTheme('dark')">🌙</button>
                    <button class="theme-btn personal" onclick="setTheme('personal')">🎨</button>
                </div>
            `)
            document.getElementById('registerForm').addEventListener('submit', async (e) => {
                e.preventDefault()
                const username = document.getElementById('username').value
                const email = document.getElementById('email').value
                const password = document.getElementById('password').value
                const confirm = document.getElementById('confirm').value
                if (password !== confirm) {
                    document.getElementById('registerError').textContent = 'Пароли не совпадают'
                    document.getElementById('registerError').style.display = 'block'
                    return
                }
                if (password.length < 6) {
                    document.getElementById('registerError').textContent = 'Пароль должен быть минимум 6 символов'
                    document.getElementById('registerError').style.display = 'block'
                    return
                }
                try {
                    const { error } = await supabase.auth.signUp({ email, password, options: { data: { username } } })
                    if (error) throw error
                    alert('Регистрация успешна! Теперь войдите.')
                    showLogin()

        async function showChatWindow() {
            if (!currentChat) return
            const messages = await getMessages(currentChat.id)
            const user = await getCurrentUser()
            
            showPage(`
                <div style="height:100vh; display:flex; flex-direction:column;">
                    <div class="glass" style="padding:16px 20px; display:flex; align-items:center; gap:16px;">
                        <button onclick="showChats()" style="background:none; border:none; font-size:24px; cursor:pointer;">←</button>

                        <div style="font-size:12px; background:rgba(66,158,243,0.2); padding:4px 10px; border-radius:20px;">🔒 AES-256</div>
                    </div>
                    <div id="messagesContainer" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px;"></div>
                    <div class="glass" style="padding:12px 16px; display:flex; gap:12px;">
                        <button onclick="document.getElementById('fileInput').click()" style="background:var(--bg-secondary); border:1px solid var(--border); border-radius:50%; width:44px; font-size:20px; cursor:pointer;">📎</button>
                        <input type="text" id="messageInput" class="input" placeholder="Сообщение..." style="flex:1;">
                        <button onclick="sendMsg()" style="background:var(--accent); border:none; border-radius:50%; width:44px; color:white; font-size:20px; cursor:pointer;">➤</button>
                        <input type="file" id="fileInput" style="display:none;" accept="image/*,video/*,.pdf,.doc,.txt">
                    </div>
                </div>
                <div class="theme-switch">
                    <button class="theme-btn light" onclick="setTheme('light')">☀️</button>
                    <button class="theme-btn dark" onclick="setTheme('dark')">🌙</button>
                    <button class="theme-btn personal" onclick="setTheme('personal')">🎨</button>
                </div>
            `)
            
            function renderMessages() {
                const container = document.getElementById('messagesContainer')
                if (!container) return
                container.innerHTML = messages.map(msg => {
                    const isOut = msg.sender_id === user?.id
                    let content = msg.decrypted || msg.encrypted_content || ''
                    let mediaHtml = ''
                    if (msg.media_url) {
                        if (msg.media_type === 'image') {
                            mediaHtml = `<img src="${msg.media_url}" class="message-media" onclick="window.open('${msg.media_url}')">`
                        } else if (msg.media_type === 'video') {
                            mediaHtml = `<video src="${msg.media_url}" controls class="message-media"></video>`
                        } else {
                            mediaHtml = `<a href="${msg.media_url}" download style="color:var(--accent)">📄 ${msg.file_name || 'Файл'}</a>`
                        }
                    }
                    const time = new Date(msg.created_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
                    return `<div class="message ${isOut ? 'out' : 'in'}">
                                <div>${escapeHtml(content)}</div>
                                ${mediaHtml}
                                <div style="font-size:10px; opacity:0.7; margin-top:4px">${time}</div>
                            </div>`
                }).join('')
                container.scrollTop = container.scrollHeight
            }
            
            function escapeHtml(text) {
                if (!text) return ''
                const div = document.createElement('div')
                div.textContent = text
                return div.innerHTML
            }
            
            renderMessages()
            
            if (messageSubscription) messageSubscription.unsubscribe()
            messageSubscription = subscribeToMessages(currentChat.id, (newMsg) => {
                messages.push(newMsg)
                renderMessages()
            })
            
            window.sendMsg = async () => {
                const input = document.getElementById('messageInput')
                const text = input?.value.trim()
                if (!text) return
                await sendMessage(currentChat.id, text, null)
                if (input) input.value = ''
                const newMessages = await getMessages(currentChat.id)
                messages.length = 0
                messages.push(...newMessages)
                renderMessages()
            }
            
            const fileInput = document.getElementById('fileInput')
            if (fileInput) {
                fileInput.onchange = async (e) => {
                    const file = e.target.files[0]
                    if (file) {
                        await sendMessage(currentChat.id, `📎 ${file.name}`, file)
                        const newMessages = await getMessages(currentChat.id)
                        messages.length = 0
                        messages.push(...newMessages)
                        renderMessages()
                    }
                    fileInput.value = ''
                }
            }
            
            const msgInput = document.getElementById('messageInput')
            if (msgInput) {
                msgInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') window.sendMsg()
                })
            }
        }

            else alert('Пользователь не найден')
        }
        window.adminAddGift = async () => {
            const name = document.getElementById('giftName')?.value
            const price = parseInt(document.getElementById('giftPrice')?.value || '0')
            const type = document.getElementById('giftType')?.value
            if (name && price) { await createGiftAdmin(name, price, type); alert('Добавлено'); showAdmin() }
        }
        window.adminDeleteGift = async (id) => {
            if (confirm('Удалить?')) { await deleteGiftAdmin(id); showAdmin() }
        }
        
        async function logout() {
            if (supabase) await supabase.auth.signOut()
            if (messageSubscription) messageSubscription.unsubscribe()
            showLogin()
        }
        
        function escapeHtml(text) {
            if (!text) return ''
            const div = document.createElement('div')
            div.textContent = text
            return div.innerHTML
        }
        
        async function initApp() {
            const user = await getCurrentUser()
            if (user) {
                currentUser = user
                await showChats()
            } else {
                showLogin()
            }
            const savedTheme = localStorage.getItem('theme') || 'light'
            setTheme(savedTheme)
        }
        
        window.setTheme = setTheme
        window.showChats = showChats
        window.showProfile = showProfile
        window.showGifts = showGifts
        window.showStories = showStories
        window.showAdmin = showAdmin
        window.logout = logout
        window.showLogin = showLogin
        window.showRegister = showRegister
        window.openChat = openChat
        window.startChat = startChat
        window.closeModal = closeModal
        window.showCreateChat = showCreateChat
        window.createGroup = createGroup
        window.createChannel = createChannel
        
        loadSupabase().then(() => initApp())
    </script>
</body>
</html>
