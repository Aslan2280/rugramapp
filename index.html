<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RuGram - Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f7fb;
            --bg-secondary: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #6c6f78;
            --accent: #429ef3;
            --accent-dark: #2b7bc9;
            --border: #e1e4e8;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border: #2a2a3e;
            --glass-bg: rgba(30, 30, 50, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        [data-theme="personal"] {
            --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-secondary: rgba(255, 255, 255, 0.95);
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --accent: #ed64a6;
            --accent-dark: #d53f8c;
            --border: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        body[data-theme="personal"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: var(--shadow);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--accent);
            color: white;
        }

        .btn:hover {
            background: var(--accent-dark);
            transform: scale(0.98);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            font-size: 16px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.2s;
            outline: none;
        }

        .input:focus {
            border-color: var(--accent);
        }

        .theme-switch {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            padding: 8px 12px;
            border-radius: 40px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: var(--border);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            margin-right: 14px;
            color: white;
            flex-shrink: 0;
        }

        .message {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.out {
            background: var(--accent);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.in {
            background: var(--bg-secondary);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow);
        }

        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: var(--shadow);
            z-index: 100;
            transition: transform 0.2s;
        }

        .fab:hover {
            transform: scale(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1100;
            animation: fadeOut 2s ease forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        @media (max-width: 768px) {
            .message { max-width: 85%; }
            .fab { bottom: 70px; width: 50px; height: 50px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">Загрузка...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://zbwoasggkcbsasbccbss.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_nQJj-Fz6HSYpkPt_xKeMNw_wbziDfJH'
        
        let supabase = null
        let currentUser = null
        let currentChat = null
        let messageSubscription = null
        
        function showPage(html) {
            document.getElementById('app').innerHTML = html
        }
        
        function showToast(msg) {
            const toast = document.createElement('div')
            toast.className = 'toast'
            toast.textContent = msg
            document.body.appendChild(toast)
            setTimeout(() => toast.remove(), 2000)
        }
        
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme)
            localStorage.setItem('theme', theme)
        }
        
        async function loadSupabase() {
            return new Promise((resolve) => {
                const script = document.createElement('script')
                script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js'
                script.onload = () => {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
                    resolve()
                }
                document.head.appendChild(script)
            })
        }
        
        async function getCurrentUser() {
            if (!supabase) return null
            try {
                const { data } = await supabase.auth.getUser()
                return data.user
            } catch { return null }
        }
        
        async function getProfile(userId) {
            if (!supabase) return null
            try {
                const { data } = await supabase.from('profiles').select('*').eq('id', userId).single()
                return data
            } catch { return null }
        }
        
        async function getUserChats() {
            if (!supabase) return []
            const user = await getCurrentUser()
            if (!user) return []
            try {
                const { data } = await supabase
                    .from('chat_members')
                    .select('chat_id, role, chat:chats(*)')
                    .eq('user_id', user.id)
                if (!data) return []
                
                const chats = []
                for (const member of data) {
                    if (!member.chat) continue
                    const chat = member.chat
                    let chatName = chat.name
                    if (chat.chat_type === 'private') {
                        const { data: other } = await supabase
                            .from('chat_members')
                            .select('user_id')
                            .eq('chat_id', chat.id)
                            .neq('user_id', user.id)
                            .single()
                        if (other) {
                            const profile = await getProfile(other.user_id)
                            chatName = profile?.username || 'Пользователь'
                        }
                    }
                    chats.push({ ...chat, name: chatName || 'Чат' })
                }
                return chats
            } catch { return [] }
        }
        
        async function getMessages(chatId) {
            if (!supabase) return []
            try {
                const { data } = await supabase
                    .from('messages')
                    .select('*, sender:sender_id(id, username)')
                    .eq('chat_id', chatId)
                    .eq('is_deleted', false)
                    .order('created_at', { ascending: true })
                    .limit(50)
                return data || []
            } catch { return [] }
        }
        
        async function sendMessage(chatId, text, file = null) {
            if (!supabase) return
            const user = await getCurrentUser()
            if (!user) return
            
            let mediaUrl = null, mediaType = null, fileName = null
            
            if (file) {
                try {
                    const ext = file.name.split('.').pop()
                    const path = `chat_${chatId}/${Date.now()}.${ext}`
                    await supabase.storage.from('rugram-media').upload(path, file)
                    const { data } = supabase.storage.from('rugram-media').getPublicUrl(path)
                    mediaUrl = data.publicUrl
                    mediaType = file.type.startsWith('image') ? 'image' : file.type.startsWith('video') ? 'video' : 'document'
                    fileName = file.name
                } catch(e) { console.log(e) }
            }
            
            await supabase.from('messages').insert({
                chat_id: chatId,
                sender_id: user.id,
                encrypted_content: text,
                media_url: mediaUrl,
                media_type: mediaType,
                file_name: fileName
            })
            
            // Начисляем Star за пост в канале
            const { data: chat } = await supabase.from('chats').select('chat_type, created_by').eq('id', chatId).single()
            if (chat && chat.chat_type === 'channel' && chat.created_by === user.id) {
                const { data: profile } = await supabase.from('profiles').select('stars_balance').eq('id', user.id).single()
                await supabase.from('profiles').update({ stars_balance: (profile?.stars_balance || 0) + 1 }).eq('id', user.id)
                showToast('⭐ +1 Star за пост в канале!')
            }
        }
        
        function subscribeToMessages(chatId, callback) {
            if (!supabase) return { unsubscribe: () => {} }
            return supabase
                .channel(`chat-${chatId}`)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `chat_id=eq.${chatId}`
                }, async (payload) => {
                    const msg = payload.new
                    const { data: sender } = await supabase
                        .from('profiles')
                        .select('id, username')
                        .eq('id', msg.sender_id)
                        .single()
                    callback({ ...msg, sender })
                })
                .subscribe()
        }
        
        async function getGifts() {
            if (!supabase) return []
            try {
                const { data } = await supabase.from('gifts').select('*').eq('is_active', true)
                return data || []
            } catch { return [] }
        }
        
        async function getStarBalance() {
            if (!supabase) return 0
            const user = await getCurrentUser()
            if (!user) return 0
            try {
                const { data } = await supabase.from('profiles').select('stars_balance').eq('id', user.id).single()
                return data?.stars_balance || 0
            } catch { return 0 }
        }
        
        async function updateStarBalance(userId, amount) {
            if (!supabase) return
            const { data: profile } = await supabase.from('profiles').select('stars_balance').eq('id', userId).single()
            await supabase.from('profiles').update({ stars_balance: (profile?.stars_balance || 0) + amount }).eq('id', userId)
        }
        
        async function isAdmin() {
            if (!supabase) return false
            const user = await getCurrentUser()
            if (!user) return false
            try {
                const { data } = await supabase.from('profiles').select('is_admin').eq('id', user.id).single()
                return data?.is_admin || false
            } catch { return false }
        }
        
        async function getAllUsers() {
            if (!supabase) return []
            try {
                const { data } = await supabase.from('profiles').select('id, email, username, stars_balance, is_admin')
                return data || []
            } catch { return [] }
        }
        
        async function modifyStars(userId, amount) {
            if (!supabase) return
            await updateStarBalance(userId, amount)
        }
        
        async function searchUsers(query) {
            if (!supabase) return []
            try {
                const { data } = await supabase.from('profiles').select('id, username').ilike('username', `%${query}%`).limit(20)
                return data || []
            } catch { return [] }
        }
        
        async function createPrivateChat(userId) {
            if (!supabase) return null
            const user = await getCurrentUser()
            if (!user) return null
            try {
                const { data: existing } = await supabase
                    .from('chat_members')
                    .select('chat_id')
                    .eq('user_id', user.id)
                if (existing) {
                    for (const e of existing) {
                        const { data: members } = await supabase
                            .from('chat_members')
                            .select('user_id')
                            .eq('chat_id', e.chat_id)
                        if (members && members.length === 2 && members.some(m => m.user_id === userId)) {
                            const { data: chat } = await supabase.from('chats').select('*').eq('id', e.chat_id).single()
                            if (chat && chat.chat_type === 'private') return chat
                        }
                    }
                }
                
                const { data: chat } = await supabase.from('chats').insert({ chat_type: 'private', created_by: user.id }).select().single()
                if (!chat) return null
                await supabase.from('chat_members').insert([
                    { chat_id: chat.id, user_id: user.id, role: 'member' },
                    { chat_id: chat.id, user_id: userId, role: 'member' }
                ])
                return chat
            } catch(e) { 
                console.log(e)
                return null 
            }
        }
        
        async function createGroupChat(name, userIds) {
            if (!supabase) return null
            const user = await getCurrentUser()
            if (!user) return null
            try {
                const { data: chat } = await supabase.from('chats').insert({ chat_type: 'group', name: name, created_by: user.id }).select().single()
                if (!chat) return null
                const members = [{ chat_id: chat.id, user_id: user.id, role: 'creator' }]
                for (const uid of userIds) {
                    members.push({ chat_id: chat.id, user_id: uid, role: 'member' })
                }
                await supabase.from('chat_members').insert(members)
                return chat
            } catch(e) { 
                console.log(e)
                return null 
            }
        }
        
        async function createChannelChat(name, description) {
            if (!supabase) return null
            const user = await getCurrentUser()
            if (!user) return null
            try {
                const { data: chat } = await supabase.from('chats').insert({ chat_type: 'channel', name: name, description: description, created_by: user.id }).select().single()
                if (!chat) return null
                await supabase.from('chat_members').insert([{ chat_id: chat.id, user_id: user.id, role: 'creator' }])
                return chat
            } catch(e) { 
                console.log(e)
                return null 
            }
        }
        
        async function sendGiftToUser(giftId, price, giftName, toUsername) {
            const user = await getCurrentUser()
            if (!user) return false
            
            const balance = await getStarBalance()
            if (balance < price) {
                showToast('❌ Недостаточно Star!')
                return false
            }
            
            const { data: toUser } = await supabase.from('profiles').select('id').eq('username', toUsername).single()
            if (!toUser) {
                showToast('❌ Пользователь не найден')
                return false
            }
            
            await updateStarBalance(user.id, -price)
            
            await supabase.from('gift_transactions').insert({
                gift_id: giftId,
                from_user_id: user.id,
                to_user_id: toUser.id,
                stars_spent: price
            })
            
            showToast(`🎁 Подарок "${giftName}" отправлен пользователю ${toUsername}!`)
            return true
        }
        
        // СТРАНИЦЫ
        async function showLogin() {
            showPage(`
                <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
                    <div class="glass" style="max-width:400px; width:100%; padding:40px 32px; text-align:center;">
                        <div style="font-size:48px;">📱</div>
                        <div style="font-size:28px; font-weight:bold;">RuGram</div>
                        <div style="color:var(--text-secondary); margin-bottom:32px;">Защищённый мессенджер</div>
                        <form id="loginForm">
                            <div style="margin-bottom:20px;">
                                <input type="email" id="email" class="input" placeholder="Email" required>
                            </div>
                            <div style="margin-bottom:20px;">
                                <input type="password" id="password" class="input" placeholder="Пароль" required>
                            </div>
                            <button type="submit" class="btn" style="width:100%;">Войти</button>
                            <div id="loginError" style="color:#e53e3e; margin-top:12px; display:none;">Ошибка входа</div>
                        </form>
                        <div style="margin-top:20px;">Нет аккаунта? <a href="#" onclick="showRegister()" style="color:var(--accent); text-decoration:none;">Зарегистрироваться</a></div>
                    </div>
                </div>
                <div class="theme-switch">
                    <button class="theme-btn" onclick="setTheme('light')">☀️</button>
                    <button class="theme-btn" onclick="setTheme('dark')">🌙</button>
                    <button class="theme-btn" onclick="setTheme('personal')">🎨</button>
                </div>
            `)
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault()
                const email = document.getElementById('email').value
                const password = document.getElementById('password').value
                try {
                    const { error } = await supabase.auth.signInWithPassword({ email, password })
                    if (error) throw error
                    await initApp()
                    showChats()
                } catch {
                    document.getElementById('loginError').style.display = 'block'
                }
            })
        }
        
        async function showRegister() {
            showPage(`
                <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
                    <div class="glass" style="max-width:400px; width:100%; padding:40px 32px; text-align:center;">
                        <div style="font-size:48px;">✨</div>
                        <div style="font-size:28px; font-weight:bold;">Регистрация</div>
                        <form id="registerForm">
                            <div style="margin-bottom:20px;">
                                <input type="text" id="username" class="input" placeholder="Имя пользователя" required>
                            </div>
                            <div style="margin-bottom:20px;">
                                <input type="email" id="email" class="input" placeholder="Email" required>
                            </div>
                            <div style="margin-bottom:20px;">
                                <input type="password" id="password" class="input" placeholder="Пароль (мин. 6 символов)" required>
                            </div>
                            <div style="margin-bottom:20px;">
                                <input type="password" id="confirm" class="input" placeholder="Подтвердите пароль" required>
                            </div>
                            <button type="submit" class="btn" style="width:100%;">Зарегистрироваться</button>
                            <div id="registerError" style="color:#e53e3e; margin-top:12px; display:none;"></div>
                        </form>
                        <div style="margin-top:20px;">Уже есть аккаунт? <a href="#" onclick="showLogin()" style="color:var(--accent); text-decoration:none;">Войти</a></div>
                    </div>
                </div>
                <div class="theme-switch">
                    <button class="theme-btn" onclick="setTheme('light')">☀️</button>
                    <button class="theme-btn" onclick="setTheme('dark')">🌙</button>
                    <button class="theme-btn" onclick="setTheme('personal')">🎨</button>
                </div>
            `)
            document.getElementById('registerForm').addEventListener('submit', async (e) => {
                e.preventDefault()
                const username = document.getElementById('username').value
                const email = document.getElementById('email').value
                const password = document.getElementById('password').value
                const confirm = document.getElementById('confirm').value
                if (password !== confirm) {
                    document.getElementById('registerError').textContent = 'Пароли не совпадают'
                    document.getElementById('registerError').style.display = 'block'
                    return
                }
                if (password.length < 6) {
                    document.getElementById('registerError').textContent = 'Пароль должен быть минимум 6 символов'
                    document.getElementById('registerError').style.display = 'block'
                    return
                }
                try {
                    const { error } = await supabase.auth.signUp({ email, password, options: { data: { username } } })
                    if (error) throw error
                    alert('Регистрация успешна! Теперь войдите.')
                    showLogin()
                } catch (err) {
                    document.getElementById('registerError').textContent = err.message
                    document.getElementById('registerError').style.display = 'block'
                }
            })
        }
        
        async function showChats() {
            currentUser = await getCurrentUser()
            if (!currentUser) { showLogin(); return }
            
            const chats = await getUserChats()
            const admin = await isAdmin()
            
            showPage(`
                <div style="max-width:800px; margin:0 auto; min-height:100vh;">
                    <div class="glass" style="padding:16px 20px; display:flex; justify-content:space-between; align-items:center;">
                        <h1>RuGram</h1>
                        <div style="display:flex; gap:16px;">
                            <span style="font-size:24px; cursor:pointer;" onclick="showProfile()">👤</span>
                            <span style="font-size:24px; cursor:pointer;" onclick="showGifts()">🎁</span>
                            ${admin ? '<span style="font-size:24px; cursor:pointer;" onclick="showAdmin()">⚙️</span>' : ''}
                        </div>
                    </div>
                    <div style="display:flex; padding:0 20px; gap:24px; border-bottom:1px solid var(--border);">
                        <div id="tabChats" style="padding:12px 0; cursor:pointer; font-weight:500; color:var(--accent); border-bottom:2px solid var(--accent);">Чаты</div>
                        <div id="tabGroups" style="padding:12px 0; cursor:pointer; color:var(--text-secondary);">Группы</div>
                        <div id="tabChannels" style="padding:12px 0; cursor:pointer; color:var(--text-secondary);">Каналы</div>
                    </div>
                    <div id="chatList" style="padding:8px 0;"></div>
                </div>
                <button class="fab" id="fabBtn">+</button>
                <div class="theme-switch">
                    <button class="theme-btn" onclick="setTheme('light')">☀️</button>
                    <button class="theme-btn" onclick="setTheme('dark')">🌙</button>
                    <button class="theme-btn" onclick="setTheme('personal')">🎨</button>
                </div>
                
                <div id="mainModal" class="modal">
                    <div class="glass modal-content">
                        <h3 style="margin-bottom:16px;">Создать</h3>
                        <button class="btn" style="width:100%; margin-bottom:12px;" onclick="showCreatePrivate()">💬 Личный чат</button>
                        <button class="btn" style="width:100%; margin-bottom:12px;" onclick="showCreateGroup()">👥 Группу</button>
                        <button class="btn" style="width:100%;" onclick="showCreateChannel()">📢 Канал</button>
                        <button class="btn-secondary" style="width:100%; margin-top:16px;" onclick="closeModal()">Отмена</button>
                    </div>
                </div>
                
                <div id="privateModal" class="modal">
                    <div class="glass modal-content">
                        <h3 style="margin-bottom:16px;">Новый чат</h3>
                        <input type="text" id="searchUser" class="input" placeholder="Поиск..." style="margin-bottom:16px;">
                        <div id="searchResults" style="max-height:300px; overflow-y:auto;"></div>
                        <button class="btn-secondary" style="width:100%; margin-top:16px;" onclick="closeModal()">Отмена</button>
                    </div>
                </div>
                
                <div id="groupModal" class="modal">
                    <div class="glass modal-content">
                        <h3 style="margin-bottom:16px;">Создать группу</h3>
                        <input type="text" id="groupName" class="input" placeholder="Название группы" style="margin-bottom:12px;">
                        <input type="text" id="groupMembers" class="input" placeholder="Username участников (через запятую)" style="margin-bottom:16px;">
                        <button class="btn" style="width:100%;" onclick="createGroup()">Создать</button>
                        <button class="btn-secondary" style="width:100%; margin-top:12px;" onclick="closeModal()">Отмена</button>
                    </div>
                </div>
                
                <div id="channelModal" class="modal">
                    <div class="glass modal-content">
                        <h3 style="margin-bottom:16px;">Создать канал</h3>
                        <input type="text" id="channelName" class="input" placeholder="Название канала" style="margin-bottom:12px;">
                        <input type="text" id="channelDesc" class="input" placeholder="Описание" style="margin-bottom:16px;">
                        <button class="btn" style="width:100%;" onclick="createChannel()">Создать</button>
                        <button class="btn-secondary" style="width:100%; margin-top:12px;" onclick="closeModal()">Отмена</button>
                    </div>
                </div>
            `)
            
            function renderList(type) {
                let list = chats.filter(c => {
                    if (type === 'chats') return c.chat_type === 'private'
                    if (type === 'groups') return c.chat_type === 'group'
                    return c.chat_type === 'channel'
                })
                const container = document.getElementById('chatList')
                if (!container) return
                if (list.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:60px; color:var(--text-secondary);">Нет чатов</div>'
                    return
                }
                container.innerHTML = list.map(chat => `
                    <div class="chat-item" onclick="openChat(${chat.id}, '${(chat.name || 'Чат').replace(/'/g, "\\'")}')">
                        <div class="avatar">${(chat.name || '💬')[0]}</div>
                        <div><b>${chat.name || 'Чат'}</b></div>
                    </div>
                `).join('')
            }
            
            renderList('chats')
            
            document.getElementById('tabChats').onclick = () => {
                document.getElementById('tabChats').style.cssText = 'color:var(--accent); border-bottom:2px solid var(--accent);'
                document.getElementById('tabGroups').style.cssText = 'color:var(--text-secondary); border-bottom:none;'
                document.getElementById('tabChannels').style.cssText = 'color:var(--text-secondary); border-bottom:none;'
                renderList('chats')
            }
            document.getElementById('tabGroups').onclick = () => {
                document.getElementById('tabGroups').style.cssText = 'color:var(--accent); border-bottom:2px solid var(--accent);'
                document.getElementById('tabChats').style.cssText = 'color:var(--text-secondary); border-bottom:none;'
                document.getElementById('tabChannels').style.cssText = 'color:var(--text-secondary); border-bottom:none;'
                renderList('groups')
            }
            document.getElementById('tabChannels').onclick = () => {
                document.getElementById('tabChannels').style.cssText = 'color:var(--accent); border-bottom:2px solid var(--accent);'
                document.getElementById('tabChats').style.cssText = 'color:var(--text-secondary); border-bottom:none;'
                document.getElementById('tabGroups').style.cssText = 'color:var(--text-secondary); border-bottom:none;'
                renderList('channels')
            }
            
            document.getElementById('fabBtn').onclick = () => {
                document.getElementById('mainModal').style.display = 'flex'
            }
        }
        
        window.showCreatePrivate = () => {
            closeModal()
            document.getElementById('privateModal').style.display = 'flex'
            const searchInput = document.getElementById('searchUser')
            if (searchInput) {
                searchInput.value = ''
                searchInput.oninput = async (e) => {
                    const query = e.target.value
                    if (query.length < 2) return
                    const users = await searchUsers(query)
                    document.getElementById('searchResults').innerHTML = users.map(user => `
                        <div class="chat-item" onclick="startChat('${user.id}', '${user.username}')">
                            <div class="avatar">${user.username[0]}</div>
                            <div>${user.username}</div>
                        </div>
                    `).join('')
                }
            }
        }
        
        window.showCreateGroup = () => {
            closeModal()
            document.getElementById('groupModal').style.display = 'flex'
        }
        
        window.showCreateChannel = () => {
            closeModal()
            document.getElementById('channelModal').style.display = 'flex'
        }
        
        window.createGroup = async () => {
            const name = document.getElementById('groupName')?.value
            const membersStr = document.getElementById('groupMembers')?.value
            if (!name) {
                alert('Введите название группы')
                return
            }
            const usernames = membersStr.split(',').map(s => s.trim()).filter(s => s)
            const userIds = []
            for (const username of usernames) {
                const { data } = await supabase.from('profiles').select('id').eq('username', username).single()
                if (data) userIds.push(data.id)
            }
            const chat = await createGroupChat(name, userIds)
            if (chat) {
                closeModal()
                showToast('Группа создана!')
                showChats()
            } else {
                alert('Ошибка создания группы')
            }
        }
        
        window.createChannel = async () => {
            const name = document.getElementById('channelName')?.value
            const desc = document.getElementById('channelDesc')?.value
            if (!name) {
                alert('Введите название канала')
                return
            }
            const chat = await createChannelChat(name, desc)
            if (chat) {
                closeModal()
                showToast('Канал создан!')
                showChats()
            } else {
                alert('Ошибка создания канала')
            }
        }
        
        window.openChat = async (id, name) => {
            currentChat = { id, name }
            await showChatWindow()
        }
        
        window.startChat = async (userId, username) => {
            const chat = await createPrivateChat(userId)
            closeModal()
            if (chat) {
                currentChat = { id: chat.id, name: username }
                await showChatWindow()
            }
        }
        
        window.closeModal = () => {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none')
        }
        
        async function showChatWindow() {
            if (!currentChat) return
            const messages = await getMessages(currentChat.id)
            const user = await getCurrentUser()
            
            showPage(`
                <div style="height:100vh; display:flex; flex-direction:column;">
                    <div class="glass" style="padding:16px 20px; display:flex; align-items:center; gap:16px;">
                        <button onclick="showChats()" style="background:none; border:none; font-size:24px; cursor:pointer;">←</button>
                        <div style="font-weight:bold; font-size:18px; flex:1;">${escapeHtml(currentChat.name)}</div>
                        <div style="font-size:12px; background:rgba(66,158,243,0.2); padding:4px 10px; border-radius:20px;">🔒 AES-256</div>
                    </div>
                    <div id="messagesContainer" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px;"></div>
                    <div class="glass" style="padding:12px 16px; display:flex; gap:12px;">
                        <button onclick="document.getElementById('fileInput').click()" style="background:var(--bg-secondary); border:1px solid var(--border); border-radius:50%; width:44px; font-size:20px; cursor:pointer;">📎</button>
                        <input type="text" id="messageInput" class="input" placeholder="Сообщение..." style="flex:1;">
                        <button onclick="sendMsg()" style="background:var(--accent); border:none; border-radius:50%; width:44px; color:white; font-size:20px; cursor:pointer;">➤</button>
                        <input type="file" id="fileInput" style="display:none;" accept="image/*,video/*,application/pdf,text/plain">
                    </div>
                </div>
                <div class="theme-switch">
                    <button class="theme-btn" onclick="setTheme('light')">☀️</button>
                    <button class="theme-btn" onclick="setTheme('dark')">🌙</button>
                    <button class="theme-btn" onclick="setTheme('personal')">🎨</button>
                </div>
            `)
            
            function renderMessages() {
                const container = document.getElementById('messagesContainer')
                if (!container) return
                container.innerHTML = messages.map(msg => {
                    const isOut = msg.sender_id === user?.id
                    let content = msg.encrypted_content || ''
                    let mediaHtml = ''
                    if (msg.media_url) {
                        if (msg.media_type === 'image') {
                            mediaHtml = `<img src="${msg.media_url}" style="max-width:200px; border-radius:12px; margin-top:6px; cursor:pointer;" onclick="window.open('${msg.media_url}')">`
                        } else if (msg.media_type === 'video') {
                            mediaHtml = `<video src="${msg.media_url}" controls style="max-width:200px; border-radius:12px; margin-top:6px;"></video>`
                        } else {
                            mediaHtml = `<a href="${msg.media_url}" download style="color:var(--accent);">📄 ${msg.file_name || 'Файл'}</a>`
                        }
                    }
                    const time = new Date(msg.created_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
                    return `<div class="message ${isOut ? 'out' : 'in'}">
                                <div>${escapeHtml(content)}</div>
                                ${mediaHtml}
                                <div style="font-size:10px; opacity:0.7; margin-top:4px">${time}</div>
                            </div>`
                }).join('')
                container.scrollTop = container.scrollHeight
            }
            
            function escapeHtml(text) {
                if (!text) return ''
                const div = document.createElement('div')
                div.textContent = text
                return div.innerHTML
            }
            
            renderMessages()
            
            if (messageSubscription) messageSubscription.unsubscribe()
            messageSubscription = subscribeToMessages(currentChat.id, (newMsg) => {
                messages.push(newMsg)
                renderMessages()
            })
            
            window.sendMsg = async () => {
                const input = document.getElementById('messageInput')
                const text = input?.value.trim()
                if (!text) return
                await sendMessage(currentChat.id, text, null)
                if (input) input.value = ''
                const newMessages = await getMessages(currentChat.id)
                messages.length = 0
                messages.push(...newMessages)
                renderMessages()
            }
            
            const fileInput = document.getElementById('fileInput')
            if (fileInput) {
                fileInput.onchange = async (e) => {
                    const file = e.target.files[0]
                    if (file) {
                        await sendMessage(currentChat.id, `📎 ${file.name}`, file)
                        const newMessages = await getMessages(currentChat.id)
                        messages.length = 0
                        messages.push(...newMessages)
                        renderMessages()
                    }
                    fileInput.value = ''
                }
            }
            
            const msgInput = document.getElementById('messageInput')
            if (msgInput) {
                msgInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') window.sendMsg()
                })
            }
        }
        
        async function showProfile() {
            const user = await getCurrentUser()
            if (!user) { showLogin(); return }
            const profile = await getProfile(user.id)
            const balance = await getStarBalance()
            const admin = await isAdmin()
            
            showPage(`
                <div style="max-width:500px; margin:0 auto; padding:20px;">
                    <div class="glass" style="text-align:center; padding:32px; margin-bottom:20px;">
                        <div style="width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg, var(--accent), var(--accent-dark)); display:flex; align-items:center; justify-content:center; font-size:48px; margin:0 auto 16px;">👤</div>
                        <h2>${escapeHtml(profile?.username || user.email.split('@')[0])}</h2>
                        <div style="color:var(--text-secondary); margin-top:8px;">${user.email}</div>
                        ${admin ? '<div style="background:#dc2626; color:white; padding:4px 12px; border-radius:20px; margin-top:12px; display:inline-block;">👑 Администратор</div>' : ''}
                    </div>
                    <div class="glass" style="display:flex; justify-content:space-between; align-items:center; padding:20px; margin-bottom:20px;">
                        <span style="font-size:20px;">⭐ Баланс Star</span>
                        <span style="font-size:32px; font-weight:bold; color:#ff9800;">${balance}</span>
                    </div>
                    <div style="display:flex; gap:12px;">
                        <button class="btn" style="flex:1" onclick="showChats()">← Чаты</button>
                        <button class="btn-secondary" style="flex:1" onclick="logout()">🚪 Выйти</button>
                    </div>
                    ${admin ? '<button class="btn" style="width:100%; margin-top:12px;" onclick="showAdmin()">⚙️ Админ панель</button>' : ''}
                </div>
                <div class="theme-switch">
                    <button class="theme-btn" onclick="setTheme('light')">☀️</button>
                    <button class="theme-btn" onclick="setTheme('dark')">🌙</button>
                    <button class="theme-btn" onclick="setTheme('personal')">🎨</button>
                </div>
            `)
        }
        
        async function showGifts() {
            const gifts = await getGifts()
            const balance = await getStarBalance()
            
            showPage(`
                <div style="max-width:800px; margin:0 auto; padding:20px;">
                    <div class="glass" style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; margin-bottom:20px;">
                        <button onclick="showChats()" style="background:none; border:none; font-size:24px; cursor:pointer;">←</button>
                        <h2>🎁 Подарки</h2>
                        <div style="background:#ffd700; color:#7c5c00; padding:8px 16px; border-radius:30px; font-weight:bold;">⭐ ${balance}</div>
                    </div>
                    <div id="giftGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:16px;"></div>
                </div>
                <div class="theme-switch">
                    <button class="theme-btn" onclick="setTheme('light')">☀️</button>
                    <button class="theme-btn" onclick="setTheme('dark')">🌙</button>
                    <button class="theme-btn" onclick="setTheme('personal')">🎨</button>
                </div>
            `)
            
            const grid = document.getElementById('giftGrid')
            if (grid) {
                grid.innerHTML = gifts.map(gift => `
                    <div class="glass" style="text-align:center; padding:20px; cursor:pointer; transition:transform 0.2s;" onmouseenter="this.style.transform='scale(1.05)'" onmouseleave="this.style.transform='scale(1)'" onclick="buyGift(${gift.id}, ${gift.price_stars}, '${gift.name}')">
                        <div style="font-size:48px;">${gift.icon || '🎁'}</div>
                        <div style="font-weight:600; margin-top:8px;">${gift.name}</div>
                        <div style="color:#ff9800; font-weight:bold; margin-top:4px;">⭐ ${gift.price_stars}</div>
                        ${gift.gift_type === 'nft' ? '<div style="background:linear-gradient(135deg,#7c3aed,#a855f7); color:white; font-size:10px; padding:2px 8px; border-radius:12px; margin-top:8px; display:inline-block;">NFT</div>' : ''}
                    </div>
                `).join('')
            }
        }
        
        window.buyGift = async (giftId, price, name) => {
            const username = prompt(`Кому подарить "${name}"?\nВведите username получателя:`)
            if (!username) return
            await sendGiftToUser(giftId, price, name, username)
            const balance = await getStarBalance()
            const balanceElem = document.querySelector('#giftGrid')?.parentElement?.querySelector('div[style*="background:#ffd700"]')
            if (balanceElem) balanceElem.innerHTML = `⭐ ${balance}`
        }
        
        async function showAdmin() {
            if (!await isAdmin()) { showChats(); return }
            const users = await getAllUsers()
            const gifts = await getGifts()
            
            showPage(`
                <div style="max-width:900px; margin:0 auto; padding:20px;">
                    <div class="glass" style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; margin-bottom:20px;">
                        <button onclick="showChats()" style="background:none; border:none; font-size:24px; cursor:pointer;">←</button>
                        <h2>⚙️ Админ панель</h2>
                        <div style="width:40px;"></div>
                    </div>
                    <div class="glass" style="padding:24px; margin-bottom:24px;">
                        <h3>⭐ Управление балансами</h3>
                        <input type="text" id="adminUserEmail" class="input" placeholder="Email пользователя" style="margin:12px 0;">
                        <input type="number" id="adminStarAmount" class="input" placeholder="Количество Star" style="margin-bottom:12px;">
                        <div style="display:flex; gap:12px;">
                            <button class="btn" style="flex:1; background:#10b981;" onclick="adminAddStars()">➕ Добавить</button>
                            <button class="btn" style="flex:1; background:#dc2626;" onclick="adminRemoveStars()">➖ Снять</button>
                        </div>
                    </div>
                    <div class="glass" style="padding:24px; margin-bottom:24px;">
                        <h3>🎁 Управление подарками</h3>
                        <input type="text" id="giftName" class="input" placeholder="Название" style="margin:12px 0;">
                        <input type="number" id="giftPrice" class="input" placeholder="Цена" style="margin-bottom:12px;">
                        <input type="text" id="giftIcon" class="input" placeholder="Иконка (эмодзи)" style="margin-bottom:12px;">
                        <select id="giftType" class="input" style="margin-bottom:12px;">
                            <option value="common">Обычный</option>
                            <option value="nft">NFT</option>
                        </select>
                        <button class="btn" style="width:100%" onclick="adminAddGift()">➕ Добавить подарок</button>
                        <div id="adminGiftList" style="margin-top:16px;"></div>
                    </div>
                    <div class="glass" style="padding:24px;">
                        <h3>👥 Пользователи</h3>
                        <div id="adminUserList"></div>
                    </div>
                </div>
                <div class="theme-switch">
                    <button class="theme-btn" onclick="setTheme('light')">☀️</button>
                    <button class="theme-btn" onclick="setTheme('dark')">🌙</button>
                    <button class="theme-btn" onclick="setTheme('personal')">🎨</button>
                </div>
            `)
            
            const userList = document.getElementById('adminUserList')
            if (userList) {
                userList.innerHTML = users.map(u => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid var(--border);">
                        <div><strong>${escapeHtml(u.username || u.email)}</strong><div style="font-size:12px;">⭐ ${u.stars_balance || 0}</div></div>
                        <div>${u.is_admin ? '<span style="color:gold;">👑 Админ</span>' : ''}</div>
                    </div>
                `).join('')
            }
            
            const giftList = document.getElementById('adminGiftList')
            if (giftList) {
                giftList.innerHTML = gifts.map(g => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid var(--border);">
                        <span>${g.icon || '🎁'} ${escapeHtml(g.name)} - ⭐${g.price_stars} ${g.gift_type === 'nft' ? '🔷 NFT' : ''}</span>
                        <button class="btn-secondary" style="padding:6px 12px;" onclick="adminDeleteGift(${g.id})">🗑️</button>
                    </div>
                `).join('')
            }
        }
        
        window.adminAddStars = async () => {
            const email = document.getElementById('adminUserEmail')?.value
            const amount = parseInt(document.getElementById('adminStarAmount')?.value || '0')
            const users = await getAllUsers()
            const user = users.find(u => u.email === email)
            if (user) {
                await modifyStars(user.id, amount)
                showToast(`Добавлено ${amount} Star пользователю ${user.username || email}`)
                showAdmin()
            } else {
                alert('Пользователь не найден')
            }
        }
        
        window.adminRemoveStars = async () => {
            const email = document.getElementById('adminUserEmail')?.value
            const amount = parseInt(document.getElementById('adminStarAmount')?.value || '0')
            const users = await getAllUsers()
            const user = users.find(u => u.email === email)
            if (user) {
                await modifyStars(user.id, -amount)
                showToast(`Снято ${amount} Star у пользователя ${user.username || email}`)
                showAdmin()
            } else {
                alert('Пользователь не найден')
            }
        }
        
        window.adminAddGift = async () => {
            const name = document.getElementById('giftName')?.value
            const price = parseInt(document.getElementById('giftPrice')?.value || '0')
            const icon = document.getElementById('giftIcon')?.value || '🎁'
            const type = document.getElementById('giftType')?.value
            if (!name || !price) {
                alert('Заполните название и цену')
                return
            }
            const user = await getCurrentUser()
            const { error } = await supabase.from('gifts').insert({
                name, price_stars: price, icon: icon, gift_type: type, is_active: true, created_by: user.id
            })
            if (error) {
                alert('Ошибка: ' + error.message)
            } else {
                showToast('Подарок добавлен!')
                showAdmin()
            }
        }
        
        window.adminDeleteGift = async (id) => {
            if (confirm('Удалить подарок?')) {
                await supabase.from('gifts').delete().eq('id', id)
                showToast('Подарок удалён')
                showAdmin()
            }
        }
        
        async function logout() {
            if (supabase) await supabase.auth.signOut()
            if (messageSubscription) messageSubscription.unsubscribe()
            showLogin()
        }
        
        function escapeHtml(text) {
            if (!text) return ''
            const div = document.createElement('div')
            div.textContent = text
            return div.innerHTML
        }
        
        async function initApp() {
            const user = await getCurrentUser()
            if (user) {
                currentUser = user
                await showChats()
            } else {
                showLogin()
            }
            const savedTheme = localStorage.getItem('theme') || 'light'
            setTheme(savedTheme)
        }
        
        window.setTheme = setTheme
        window.showChats = showChats
        window.showProfile = showProfile
        window.showGifts = showGifts
        window.showAdmin = showAdmin
        window.logout = logout
        window.showLogin = showLogin
        window.showRegister = showRegister
        window.openChat = openChat
        window.startChat = startChat
        window.closeModal = closeModal
        window.showCreatePrivate = showCreatePrivate
        window.showCreateGroup = showCreateGroup
        window.showCreateChannel = showCreateChannel
        window.createGroup = createGroup
        window.createChannel = createChannel
        window.buyGift = buyGift
        window.adminAddStars = adminAddStars
        window.adminRemoveStars = adminRemoveStars
        window.adminAddGift = adminAddGift
        window.adminDeleteGift = adminDeleteGift
        
        loadSupabase().then(() => initApp())
    </script>
</body>
</html>
